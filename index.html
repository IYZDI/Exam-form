<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Form Filler</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Exam Form Filler</h1>
      <p>Complete the form and download a 4-page PDF.</p>
    </header>

    <section class="page bg-page1" id="page1" aria-label="Exam form page 1">
      <input class="field" id="name" type="text" placeholder="Full Name" autocomplete="name">
      <input class="field" id="license" type="text" placeholder="License Number">
      <input class="field" id="email" type="email" placeholder="Email" autocomplete="email">
      <input class="field" id="phone" type="tel" placeholder="Phone Number" autocomplete="tel">
      <input class="field" id="address" type="text" placeholder="Address" autocomplete="street-address">
      <input class="field" id="nationality" type="text" placeholder="Nationality">
      <input class="field" id="dob" type="text" placeholder="Date of Birth (DD/MM/YYYY)">
    </section>

    <section class="page bg-page2" id="page2" aria-label="Exam form page 2">
      <label class="exam-check" id="exam-atpl"><input type="checkbox" aria-label="ATPL exam"></label>
      <label class="exam-check" id="exam-cpl"><input type="checkbox" aria-label="CPL exam"></label>
      <label class="exam-check" id="exam-ppl"><input type="checkbox" aria-label="PPL exam"></label>
      <label class="exam-check" id="exam-ifr"><input type="checkbox" aria-label="IFR exam"></label>
      <label class="exam-check" id="exam-meteorology"><input type="checkbox" aria-label="Meteorology exam"></label>
      <label class="exam-check" id="exam-navigation"><input type="checkbox" aria-label="Navigation exam"></label>
      <label class="exam-check" id="exam-airlaw"><input type="checkbox" aria-label="Air Law exam"></label>
      <label class="exam-check" id="exam-humanfactors"><input type="checkbox" aria-label="Human Factors exam"></label>
    </section>

    <section class="page bg-page3" id="page3" aria-label="Exam form page 3"></section>

    <section class="page bg-page4" id="page4" aria-label="Exam form page 4"></section>

    <div class="actions">
      <button id="downloadPdf" type="button">Download PDF</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
